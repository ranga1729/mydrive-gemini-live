<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyDrive Assistant (Unified)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  /* Same base styles as before – kept for consistency */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --panel:     #16161f;
    --border:    #22222e;
    --accent:    #6c63ff;
    --accent2:   #ff6b9d;
    --green:     #00e5a0;
    --amber:     #ffb830;
    --red:       #ff4d6d;
    --text:      #e8e8f0;
    --muted:     #5a5a72;
    --user-bg:   #1e1b3a;
    --ai-bg:     #131320;
    --radius:    14px;
    --font-ui:   'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.35;
  }

  .app {
    display: grid; grid-template-rows: auto 1fr auto;
    height: 100vh; max-width: 860px; margin: 0 auto; padding: 0 16px;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 14px; border-bottom: 1px solid var(--border); gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; box-shadow: 0 0 20px rgba(108,99,255,.35);
  }
  .title-block h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.1; }
  .title-block small { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px;
    padding: 3px 9px; border-radius: 20px;
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    transition: all .3s; margin-top: 4px;
  }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
  .status-pill.connected .dot  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-pill.connected       { color: var(--green); border-color: rgba(0,229,160,.2); }
  .status-pill.listening .dot  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: blink .7s infinite; }
  .status-pill.listening       { color: var(--accent2); border-color: rgba(255,107,157,.2); }
  .status-pill.processing .dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink .9s infinite; }
  .status-pill.processing      { color: var(--amber); border-color: rgba(255,184,48,.2); }
  .status-pill.speaking .dot   { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink .5s infinite; }
  .status-pill.speaking        { color: var(--accent); border-color: rgba(108,99,255,.2); }
  .status-pill.error .dot      { background: var(--red); }
  .status-pill.error           { color: var(--red); border-color: rgba(255,77,109,.2); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .config-panel { display: flex; flex-direction: column; gap: 6px; }
  .config-row { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
  .config-row label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .config-row input {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 10px; border-radius: 8px;
    width: 160px; outline: none; transition: border-color .2s, color .2s;
  }
  .config-row input:focus { border-color: var(--accent); color: var(--text); }

  /* Speaker toggle */
  .speaker-toggle {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px; cursor: pointer;
    transition: all .2s;
  }
  .speaker-toggle.active { border-color: var(--accent); background: rgba(108,99,255,.1); }
  .speaker-toggle .icon { font-size: 14px; }
  .speaker-toggle .state { color: var(--muted); }
  .speaker-toggle.active .state { color: var(--accent); }

  /* Messages */
  .messages {
    overflow-y: auto; padding: 20px 0;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .bubble-wrap {
    display: flex; flex-direction: column;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .25s forwards;
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  .bubble-wrap.user  { align-items: flex-end; }
  .bubble-wrap.ai    { align-items: flex-start; }

  .bubble {
    max-width: 72%; padding: 11px 15px; border-radius: var(--radius);
    font-size: 14.5px; line-height: 1.55; position: relative;
  }
  .bubble-wrap.user .bubble {
    background: var(--user-bg); border: 1px solid rgba(108,99,255,.25); border-bottom-right-radius: 4px;
  }
  .bubble-wrap.ai .bubble {
    background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px;
  }

  .bubble.transcript {
    background: transparent;
    border-color: rgba(255,255,255,.06);
    color: rgba(232,232,240,.6);
    font-size: 13px;
    font-style: italic;
  }
  .bubble-wrap.user .bubble.transcript {
    background: transparent;
    border-color: rgba(108,99,255,.1);
  }

  .bubble-meta {
    font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    margin: 4px 4px 0; display: flex; align-items: center; gap: 5px;
  }
  .bubble-meta svg { width:10px; height:10px; }

  .bubble-wrap.ai .bubble.thinking { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
  .thinking-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .thinking-dot:nth-child(2) { animation-delay: .15s; }
  .thinking-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* Tool Call Card (unchanged) */
  .tool-card {
    width: min(540px, 92vw);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .tool-card.request_roadside_assistance { border-color: rgba(255,184,48,.3);  }
  .tool-card.request_tow_truck           { border-color: rgba(255,77,109,.3);  }
  .tool-card.search_spare_parts          { border-color: rgba(108,99,255,.3);  }
  .tool-card.book_garage_service         { border-color: rgba(0,229,160,.3);   }
  .tool-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px 9px;
    border-bottom: 1px solid var(--border);
  }
  .tool-card.request_roadside_assistance .tool-card-header { background: rgba(255,184,48,.06); }
  .tool-card.request_tow_truck           .tool-card-header { background: rgba(255,77,109,.06); }
  .tool-card.search_spare_parts          .tool-card-header { background: rgba(108,99,255,.06); }
  .tool-card.book_garage_service         .tool-card-header { background: rgba(0,229,160,.06);  }
  .tool-badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
    padding: 3px 11px; border-radius: 20px; letter-spacing: 0.3px;
  }
  .tool-card.request_roadside_assistance .tool-badge { background: rgba(255,184,48,.12); color: var(--amber);  border: 1px solid rgba(255,184,48,.25); }
  .tool-card.request_tow_truck           .tool-badge { background: rgba(255,77,109,.12); color: var(--red);    border: 1px solid rgba(255,77,109,.25); }
  .tool-card.search_spare_parts          .tool-badge { background: rgba(108,99,255,.12); color: var(--accent); border: 1px solid rgba(108,99,255,.25); }
  .tool-card.book_garage_service         .tool-badge { background: rgba(0,229,160,.12);  color: var(--green);  border: 1px solid rgba(0,229,160,.25);  }
  .triggered-chip {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 9px; border-radius: 20px;
    background: rgba(0,229,160,.08); color: var(--green);
    border: 1px solid rgba(0,229,160,.2);
    display: flex; align-items: center; gap: 5px;
  }
  .triggered-chip::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 5px var(--green);
    animation: blink .8s infinite;
  }
  .tool-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; background: var(--ai-bg); }
  .tc-section { display: flex; flex-direction: column; gap: 5px; }
  .tc-label {
    font-family: var(--font-mono); font-size: 9.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .args-grid { display: flex; flex-direction: column; gap: 4px; }
  .arg-row {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 13px; line-height: 1.5;
  }
  .arg-key {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--muted); flex-shrink: 0; min-width: 110px;
  }
  .arg-val { color: var(--text); }
  .result-block {
    font-family: var(--font-mono); font-size: 11.5px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .result-row { display: flex; gap: 10px; align-items: baseline; }
  .result-key { color: var(--muted); min-width: 90px; flex-shrink: 0; }
  .result-val { color: var(--text); }
  .result-val.ok     { color: var(--green); }
  .result-val.eta    { color: var(--amber); }
  .result-val.accent { color: var(--accent); }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border); padding: 14px 0 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .text-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-ui);
    font-size: 14px; padding: 11px 14px; resize: none;
    min-height: 46px; max-height: 120px; outline: none; line-height: 1.5;
    transition: border-color .2s;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  .btn-send {
    width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
    background: var(--accent); border: none; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s, opacity .2s;
    box-shadow: 0 4px 14px rgba(108,99,255,.4);
  }
  .btn-send:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,.55); }
  .btn-send:active:not(:disabled) { transform: translateY(0); }
  .btn-send:disabled { opacity: .35; cursor: not-allowed; }
  .btn-send svg { width: 18px; height: 18px; }

  .voice-row { display: flex; align-items: center; gap: 14px; }

  .btn-mic {
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--panel); border: 2px solid var(--border); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .btn-mic svg { width: 22px; height: 22px; transition: color .2s; }
  .btn-mic:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
  .btn-mic.recording {
    background: rgba(255,107,157,.12); border-color: var(--accent2); color: var(--accent2);
    box-shadow: 0 0 0 6px rgba(255,107,157,.12), 0 0 24px rgba(255,107,157,.25);
    animation: pulse-ring 1.2s infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,107,157,.35), 0 0 24px rgba(255,107,157,.2); }
    70%  { box-shadow: 0 0 0 10px rgba(255,107,157,0), 0 0 24px rgba(255,107,157,.2); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,157,0), 0 0 24px rgba(255,107,157,.2); }
  }
  .btn-mic:disabled { opacity: .3; cursor: not-allowed; }

  .waveform { display: flex; align-items: center; gap: 3px; height: 28px; opacity: 0; transition: opacity .3s; }
  .waveform.active { opacity: 1; }
  .waveform .bar { width: 3px; border-radius: 3px; background: var(--accent2); animation: wave 1s ease-in-out infinite; }
  .waveform .bar:nth-child(1){height:8px;animation-delay:0s}
  .waveform .bar:nth-child(2){height:16px;animation-delay:.1s}
  .waveform .bar:nth-child(3){height:22px;animation-delay:.2s}
  .waveform .bar:nth-child(4){height:14px;animation-delay:.3s}
  .waveform .bar:nth-child(5){height:20px;animation-delay:.15s}
  .waveform .bar:nth-child(6){height:10px;animation-delay:.25s}
  .waveform .bar:nth-child(7){height:18px;animation-delay:.05s}
  @keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.9)} }

  .voice-hint { font-family: var(--font-mono); font-size: 11px; color: var(--muted); transition: color .2s; }
  .voice-hint.recording { color: var(--accent2); }

  .speaking-bar { display: flex; align-items: center; gap: 3px; height: 28px; opacity: 0; transition: opacity .3s; margin-left: auto; }
  .speaking-bar.active { opacity: 1; }
  .speaking-bar .bar { width: 3px; border-radius: 3px; background: var(--accent); animation: wave 0.8s ease-in-out infinite; }
  .speaking-bar .bar:nth-child(1){height:10px;animation-delay:0s}
  .speaking-bar .bar:nth-child(2){height:18px;animation-delay:.08s}
  .speaking-bar .bar:nth-child(3){height:24px;animation-delay:.16s}
  .speaking-bar .bar:nth-child(4){height:16px;animation-delay:.24s}
  .speaking-bar .bar:nth-child(5){height:20px;animation-delay:.1s}

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: var(--muted); font-family: var(--font-mono); font-size: 12px; text-align: center;
  }
  .empty-state .icon { font-size: 38px; margin-bottom: 6px; opacity: .4; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <div class="logo">🚗</div>
      <div class="title-block">
        <h1>MyDrive Assistant</h1>
        <div class="status-pill" id="statusPill">
          <span class="dot"></span>
          <span id="statusText">Connecting…</span>
        </div>
      </div>
    </div>
    <div class="config-panel">
      <div class="config-row">
        <label>Host</label>
        <input type="text" id="hostInput" value="localhost:8000" placeholder="host:port"/>
      </div>
      <div class="config-row">
        <label>Session ID</label>
        <input type="text" id="sessionIdInput" placeholder="auto-generated"/>
      </div>
      <div class="config-row">
        <div class="speaker-toggle" id="speakerToggle">
          <span class="icon">🔊</span>
          <span class="state" id="speakerState">off</span>
        </div>
      </div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">◎</div>
      <div>Type a message or hold the mic to begin</div>
    </div>
  </div>

  <div class="input-area">
    <div class="text-row">
      <textarea id="textInput" rows="1" placeholder="Type a message…"></textarea>
      <button class="btn-send" id="btnSend" title="Send text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="voice-row">
      <button class="btn-mic" id="btnMic" title="Hold to record">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="waveform" id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <span class="voice-hint" id="voiceHint">Hold to record voice</span>
      <div class="speaking-bar" id="speakingBar">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>
    </div>
  </div>

</div>

<script>
// --- Unified WebSocket client for MyDrive API v2 ---

// Helper: get session ID from input or generate
function getSessionId() {
  const input = document.getElementById('sessionIdInput').value.trim();
  if (input) return input;
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('session_id')) {
    const sid = urlParams.get('session_id');
    document.getElementById('sessionIdInput').value = sid;
    return sid;
  }
  const newId = 'session_' + Math.random().toString(36).substr(2, 9);
  document.getElementById('sessionIdInput').value = newId;
  return newId;
}

// Build WebSocket URL
function wsUrl() {
  const host = document.getElementById('hostInput').value.trim() || 'localhost:8000';
  return `ws://${host}/ws/chat?session_id=${getSessionId()}`;
}

// DOM elements
const msgContainer   = document.getElementById('messages');
const emptyState     = document.getElementById('emptyState');
const statusPill     = document.getElementById('statusPill');
const statusText     = document.getElementById('statusText');
const btnMic         = document.getElementById('btnMic');
const btnSend        = document.getElementById('btnSend');
const textInput      = document.getElementById('textInput');
const waveform       = document.getElementById('waveform');
const voiceHint      = document.getElementById('voiceHint');
const speakingBar    = document.getElementById('speakingBar');
const speakerToggle  = document.getElementById('speakerToggle');
const speakerState   = document.getElementById('speakerState');
const hostInput      = document.getElementById('hostInput');
const sessionIdInput = document.getElementById('sessionIdInput');

// Tool metadata for cards (unchanged)
const TOOL_META = {
  request_roadside_assistance: { icon: '🔧', label: 'Roadside Assistance' },
  request_tow_truck:           { icon: '🚛', label: 'Tow Truck'           },
  search_spare_parts:          { icon: '🔩', label: 'Spare Parts Search'  },
  book_garage_service:         { icon: '🏪', label: 'Garage Booking'      },
};

// State
let ws = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let audioQueue = [];
let isPlayingAudio = false;
let thinkingBubble = null;
let pendingToolCall = null;
let currentSpeakerMode = false; // will be updated from server
let reconnectTimer = null;

// --- UI Helpers ---
function setStatus(state, label) {
  statusPill.className = 'status-pill ' + state;
  statusText.textContent = label;
}

function hideEmpty() {
  if (emptyState) emptyState.style.display = 'none';
}

function scrollToBottom() {
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function addBubble(role, content, inputKind = null) {
  hideEmpty();
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  wrap.appendChild(bubble);

  if (role === 'user') {
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    if (inputKind === 'voice') {
      meta.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Voice`;
    } else {
      meta.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Text`;
    }
    wrap.appendChild(meta);
  }
  msgContainer.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function showThinkingBubble() {
  if (thinkingBubble) return;
  hideEmpty();
  thinkingBubble = document.createElement('div');
  thinkingBubble.className = 'bubble-wrap ai';
  thinkingBubble.innerHTML = `<div class="bubble thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>`;
  msgContainer.appendChild(thinkingBubble);
  scrollToBottom();
}

function hideThinkingBubble() {
  if (thinkingBubble) {
    thinkingBubble.remove();
    thinkingBubble = null;
  }
}

// --- Tool card render (unchanged from previous) ---
function renderToolCard(data) {
  hideEmpty();
  const toolName = data.tool || 'unknown';
  const args     = data.args   || {};
  const result   = data.result || {};
  const meta     = TOOL_META[toolName] || { icon: '⚙️', label: toolName };

  const argsHtml = Object.entries(args).length
    ? Object.entries(args).map(([k, v]) =>
        `<div class="arg-row">
          <span class="arg-key">${escHtml(k)}</span>
          <span class="arg-val">${escHtml(String(v))}</span>
        </div>`
      ).join('')
    : '<span style="color:var(--muted);font-size:12px">none</span>';

  const resultHtml = Object.entries(result).map(([k, v]) => {
    let cls = '';
    if (k === 'status')       cls = 'ok';
    else if (k.includes('eta') || k.includes('time') || k.includes('available')) cls = 'eta';
    else if (k.includes('count') || k.includes('type') || k.includes('service')) cls = 'accent';
    return `<div class="result-row">
      <span class="result-key">${escHtml(k)}</span>
      <span class="result-val ${cls}">${escHtml(String(v))}</span>
    </div>`;
  }).join('');

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ai';
  wrap.innerHTML = `
    <div class="tool-card ${escHtml(toolName)}">
      <div class="tool-card-header">
        <span class="tool-badge">
          <span>${meta.icon}</span>
          ${escHtml(meta.label)}
        </span>
        <span class="triggered-chip">Triggered</span>
      </div>
      <div class="tool-card-body">
        <div class="tc-section">
          <span class="tc-label">Parameters</span>
          <div class="args-grid">${argsHtml}</div>
        </div>
        <div class="tc-section">
          <span class="tc-label">Result</span>
          <div class="result-block">${resultHtml}</div>
        </div>
      </div>
    </div>
    <div class="bubble-meta" style="margin-top:5px">
      MyDrive AI · ${new Date().toLocaleTimeString()}
    </div>
  `;
  msgContainer.appendChild(wrap);
  scrollToBottom();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Audio playback (same as before) ---
function pcmToWav(pcmBuffer, sampleRate = 24000) {
  const numChannels = 1, bitsPerSample = 16;
  const byteRate   = sampleRate * numChannels * bitsPerSample / 8;
  const blockAlign = numChannels * bitsPerSample / 8;
  const wavBuffer  = new ArrayBuffer(44 + pcmBuffer.byteLength);
  const view       = new DataView(wavBuffer);
  const write = (off, str) => { for (let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  write(0, 'RIFF');
  view.setUint32(4,  36 + pcmBuffer.byteLength, true);
  write(8, 'WAVE'); write(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1,  true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate,  true);
  view.setUint32(28, byteRate,    true);
  view.setUint16(32, blockAlign,  true);
  view.setUint16(34, bitsPerSample, true);
  write(36, 'data');
  view.setUint32(40, pcmBuffer.byteLength, true);
  new Uint8Array(wavBuffer).set(new Uint8Array(pcmBuffer), 44);
  return wavBuffer;
}

async function drainAudioQueue() {
  if (isPlayingAudio) return;
  isPlayingAudio = true;
  speakingBar.classList.add('active');
  setStatus('speaking', 'Speaking…');

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

  while (audioQueue.length > 0) {
    const pcm = audioQueue.shift();
    const wav = pcmToWav(pcm, 24000);
    try {
      const decoded = await audioCtx.decodeAudioData(wav);
      await new Promise(resolve => {
        const source = audioCtx.createBufferSource();
        source.buffer = decoded;
        source.connect(audioCtx.destination);
        source.onended = resolve;
        source.start();
      });
    } catch(e) { console.warn('Audio play error', e); }
    await new Promise(r => setTimeout(r, 5));
  }

  await audioCtx.close();
  isPlayingAudio = false;
  speakingBar.classList.remove('active');
  setStatus('connected', 'Ready');

  // If we had a pending tool call, show it now
  if (pendingToolCall) {
    renderToolCard(pendingToolCall);
    pendingToolCall = null;
  }
}

// --- WebSocket message handling ---
function handleIncomingMessage(event) {
  if (event.data instanceof ArrayBuffer) {
    // Binary PCM audio
    audioQueue.push(event.data);
    if (!isPlayingAudio) drainAudioQueue();
    return;
  }

  // Text JSON
  let msg;
  try {
    msg = JSON.parse(event.data);
  } catch (e) {
    console.warn('Invalid JSON', e);
    return;
  }

  switch (msg.type) {
    case 'session_ready':
      setStatus('connected', 'Ready');
      currentSpeakerMode = msg.speaker_mode || false;
      updateSpeakerUI();
      break;

    case 'user_transcript':
      // Show voice transcript as a user bubble
      addBubble('user', `🎙️ "${msg.text}"`, 'voice');
      break;

    case 'assistant_text':
      hideThinkingBubble();
      addBubble('ai', msg.text);
      break;

    case 'tool_call':
      // Store until after audio finishes, or show immediately if no audio
      pendingToolCall = msg;
      if (!isPlayingAudio && audioQueue.length === 0) {
        renderToolCard(pendingToolCall);
        pendingToolCall = null;
      }
      break;

    case 'turn_complete':
      // Optionally update status, but we already manage via audio queue
      break;

    case 'speaker_mode_updated':
      currentSpeakerMode = msg.enabled;
      updateSpeakerUI();
      break;

    case 'error':
      setStatus('error', 'Error');
      addBubble('ai', `❌ ${msg.message || 'Unknown error'}`);
      break;

    case 'session_ended':
      setStatus('error', 'Session ended');
      ws.close();
      break;

    default:
      console.log('Unknown message type:', msg.type);
  }
}

// --- WebSocket connection ---
function connectWebSocket() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  if (reconnectTimer) clearTimeout(reconnectTimer);

  try {
    ws = new WebSocket(wsUrl());
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('connected', 'Connected, waiting for session...');
    };

    ws.onmessage = handleIncomingMessage;

    ws.onerror = (err) => {
      console.error('WebSocket error', err);
      setStatus('error', 'Connection error');
    };

    ws.onclose = (e) => {
      if (!e.wasClean) {
        setStatus('error', 'Disconnected');
        // Attempt reconnect after a delay
        reconnectTimer = setTimeout(() => {
          connectWebSocket();
        }, 3000);
      }
    };
  } catch (e) {
    setStatus('error', 'Cannot connect');
    reconnectTimer = setTimeout(connectWebSocket, 3000);
  }
}

// --- Send JSON helper ---
function sendJson(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  } else {
    addBubble('ai', '⚠️ Not connected to server.');
  }
}

// --- Speaker toggle ---
function updateSpeakerUI() {
  speakerState.textContent = currentSpeakerMode ? 'on' : 'off';
  if (currentSpeakerMode) {
    speakerToggle.classList.add('active');
  } else {
    speakerToggle.classList.remove('active');
  }
}

speakerToggle.addEventListener('click', () => {
  const newMode = !currentSpeakerMode;
  sendJson({ type: 'set_speaker', enabled: newMode });
  // Optimistic update; server will confirm with speaker_mode_updated
  currentSpeakerMode = newMode;
  updateSpeakerUI();
});

// --- Text sending ---
function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  addBubble('user', text, 'text');
  textInput.value = '';
  autoResize();
  showThinkingBubble();
  sendJson({ type: 'text_input', text });
  setStatus('processing', 'Thinking…');
}

textInput.addEventListener('input', autoResize);
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});
btnSend.addEventListener('click', sendText);

function autoResize() {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
}

// --- Voice recording (MediaRecorder + PCM conversion) ---
async function startRecording() {
  if (isRecording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
    });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = sendVoicePCM;
    mediaRecorder.start(100);
    isRecording = true;
    btnMic.classList.add('recording');
    waveform.classList.add('active');
    voiceHint.classList.add('recording');
    voiceHint.textContent = 'Recording… release to send';
    setStatus('listening', 'Listening…');

    // Send voice_start
    sendJson({ type: 'voice_start' });
  } catch (e) {
    addBubble('ai', '⚠️ Microphone access denied.');
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  btnMic.classList.remove('recording');
  waveform.classList.remove('active');
  voiceHint.classList.remove('recording');
  voiceHint.textContent = 'Hold to record voice';
  setStatus('processing', 'Processing…');
}

async function sendVoicePCM() {
  if (!audioChunks.length || !ws || ws.readyState !== WebSocket.OPEN) {
    // Still send voice_end to avoid hanging state
    sendJson({ type: 'voice_end' });
    return;
  }

  // Show a placeholder voice bubble
  const voiceWrap = addBubble('user', '🎙️ Voice message…', 'voice');
  showThinkingBubble();

  // Convert webm to PCM (16kHz mono int16)
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const arrayBuf = await blob.arrayBuffer();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const decoded = await audioCtx.decodeAudioData(arrayBuf);
  await audioCtx.close();

  const floatData = decoded.getChannelData(0);
  const int16Data = new Int16Array(floatData.length);
  for (let i = 0; i < floatData.length; i++) {
    int16Data[i] = Math.max(-32768, Math.min(32767, Math.round(floatData[i] * 32767)));
  }

  // Send binary PCM (still in voice_active state)
  ws.send(int16Data.buffer);
  // Then signal end of voice
  sendJson({ type: 'voice_end' });
}

// --- Interrupt (clear audio buffer) ---
function sendInterrupt() {
  sendJson({ type: 'interrupt' });
  audioQueue = []; // discard any pending audio
  if (isPlayingAudio) {
    // Force stop? We'll just clear queue and let it finish current.
  }
  setStatus('connected', 'Ready');
}

// --- Event listeners for mic ---
btnMic.addEventListener('mousedown', startRecording);
btnMic.addEventListener('mouseup', stopRecording);
btnMic.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
btnMic.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

// --- Reconnect when host/session changes ---
[hostInput, sessionIdInput].forEach(el => {
  el.addEventListener('change', () => {
    if (ws) ws.close();
    connectWebSocket();
  });
});

// Optional: send interrupt on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    sendInterrupt();
  }
});

// --- Initialise ---
getSessionId(); // ensures input field is set
connectWebSocket();
</script>
